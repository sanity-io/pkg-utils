packages:
  - benchmarks/*
  - packages/@sanity/*
  - playground/*
  - css-playground/*
  - packages/@sanity/tsdown-config/test/fixtures/**

catalog:
  '@sanity/client': ^7.23.0
  '@sanity/icons': ^3.8.0
  '@sanity/logos': ^2.2.2
  '@types/node': ^24.13.3
  lightningcss: ^1.32.0
  publint: ^0.3.21
  tsdown: ^0.22.8
  typescript: 7.0.2
  vitest: ^4.1.10

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - '@next/*'
  - '@oxlint/*'
  - '@oxlint-tsgolint/*'
  - '@portabletext/*'
  - '@rollup/*'
  - '@sanity/*'
  - '@types/*'
  - '@typescript/*'
  - '@vite/*'
  - '@vitest/*'
  - '@yuku-codegen/*'
  - '@yuku-parser/*'
  - csstype
  - groq
  - groq-js
  - next
  - oxlint
  - oxlint-tsgolint
  - react
  - react-dom
  - react-is
  - rollup
  - sanity
  - vite
  - vitest
  # Dev-only framework deps used exclusively by the css-playground smoke tests. These are not
  # shipped, so the supply-chain release-age delay does not apply; pin the latest to keep the
  # cross-framework matrix building against current releases.
  - '@astrojs/react'
  # TypeScript 7 (the Go-native compiler) and related toolchain releases that need to be
  # consumed immediately, including the yuku AST toolchain used by rolldown-plugin-dts
  # and the oxc types shipped with each rolldown release.
  - typescript
  - tsdown
  - rolldown
  - '@rolldown/*'
  - '@oxc-project/*'
  - rolldown-plugin-dts
  - yuku-ast
  - yuku-parser
  - yuku-codegen
  # Vanilla Extract plugins and integration packages tracked by the Sanity
  # vanilla-extract-* packages and their benchmarks; bump immediately so the
  # comparison suite and plugin peers stay on current releases.
  - '@vanilla-extract/*'

overrides:
  '@sanity/pkg-utils': workspace:*

# This is needed for prettier to be able to use the plugin specified by the `@sanity/prettier-config` preset
publicHoistPattern:
  - '*prettier*'

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - '@sanity/sdk@2.1.2'
  - chokidar@4.0.3
  - groq@3.88.1-typegen-experimental.0
  - tinyexec@1.2.2
  - reselect@5.1.1
  - rxjs@7.8.2
  - semver@5.7.2 || 6.3.1
  - undici@5.29.0
  - vite@6.4.1

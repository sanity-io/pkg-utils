packages:
  - packages/@sanity/*
  - playground/*
  - css-playground/*
  - packages/@sanity/tsdown-config/test/fixtures/**

catalog:
  '@sanity/client': ^7.23.0
  '@sanity/icons': ^3.8.0
  '@sanity/logos': ^2.2.2
  '@types/node': ^24.13.2
  '@typescript/native-preview': 7.0.0-dev.20260421.2
  publint: ^0.3.21
  tsdown: ^0.22.4
  typescript: 6.0.3
  vitest: ^4.1.10

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - '@next/*'
  - '@oxlint/*'
  - '@oxlint-tsgolint/*'
  - '@portabletext/*'
  - '@rollup/*'
  - '@sanity/*'
  - '@types/*'
  - '@typescript/*'
  - '@vite/*'
  - '@vitest/*'
  - csstype
  - groq
  - groq-js
  - next
  - oxlint
  - oxlint-tsgolint
  - react
  - react-dom
  - react-is
  - rollup
  - sanity
  - vite
  - vitest
  # Renovate security update: lodash-es@4.17.23
  - lodash-es@4.17.23
  # Renovate security update: lodash@4.17.23
  - lodash@4.17.23
  # Renovate security update: astro@6.1.10
  - astro@6.1.10
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
  # Dev-only framework deps used exclusively by the css-playground smoke tests. These are not
  # shipped, so the supply-chain release-age delay does not apply; pin the latest to keep the
  # cross-framework matrix building against current releases.
  - '@astrojs/react'

overrides:
  '@sanity/pkg-utils': workspace:*

# This is needed for prettier to be able to use the plugin specified by the `@sanity/prettier-config` preset
publicHoistPattern:
  - '*prettier*'

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - '@sanity/sdk@2.1.2'
  - chokidar@4.0.3
  - groq@3.88.1-typegen-experimental.0
  - tinyexec@1.2.2
  - reselect@5.1.1
  - rxjs@7.8.2
  - semver@5.7.2 || 6.3.1
  - undici@5.29.0
  - vite@6.4.1
